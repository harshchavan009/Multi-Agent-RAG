version: '3.9'

# ============================================================
# Enterprise Agentic RAG — Docker Compose (Production)
# ============================================================

x-common-env: &common-backend-env
  DATABASE_URL: ${DATABASE_URL}
  ASYNC_DATABASE_URL: ${ASYNC_DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  VECTOR_DB_PROVIDER: qdrant
  QDRANT_URL: ${QDRANT_URL}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  JWT_ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  ENVIRONMENT: production
  LOG_LEVEL: info
  CORS_ORIGINS: ${CORS_ORIGINS}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
  UPLOAD_DIR: /app/uploads
  MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network

  qdrant:
    image: qdrant/qdrant:v1.9.3
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
      - ./infra/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rag_network
    deploy:
      resources:
        limits:
          memory: 2G

  backend:
    image: ${BACKEND_IMAGE:-enterprise-rag-backend:latest}
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop
    environment:
      <<: *common-backend-env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rag_network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  celery_worker:
    image: ${BACKEND_IMAGE:-enterprise-rag-backend:latest}
    restart: always
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info --concurrency=4 -Q default,documents,embeddings
    environment:
      <<: *common-backend-env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - redis
      - postgres
    networks:
      - rag_network

  frontend:
    image: ${FRONTEND_IMAGE:-enterprise-rag-frontend:latest}
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    networks:
      - rag_network
    deploy:
      replicas: 2

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - rag_network
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  uploads_data:
  nginx_cache:

networks:
  rag_network:
    driver: bridge
