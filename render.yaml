# ============================================================
# Render — render.yaml (Infrastructure as Code)
# https://render.com/docs/infrastructure-as-code
# ============================================================

services:
  # ── Backend API ─────────────────────────────────────────────
  - type: web
    name: enterprise-rag-backend
    runtime: docker
    repo: https://github.com/harshchavan009/AI-Chatbot
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: enterprise-rag-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: enterprise-rag-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false  # Set manually in dashboard
      - key: QDRANT_URL
        fromService:
          name: enterprise-rag-qdrant
          type: web
          property: host
      - key: CORS_ORIGINS
        value: https://enterprise-rag-frontend.onrender.com
      - key: LOG_LEVEL
        value: info
    autoDeploy: true

  # ── Frontend ─────────────────────────────────────────────────
  - type: web
    name: enterprise-rag-frontend
    runtime: docker
    repo: https://github.com/harshchavan009/AI-Chatbot
    branch: main
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    region: oregon
    plan: starter
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://enterprise-rag-backend.onrender.com/api/v1
      - key: NEXT_PUBLIC_WS_URL
        value: wss://enterprise-rag-backend.onrender.com
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
    autoDeploy: true

  # ── Qdrant Vector DB ─────────────────────────────────────────
  - type: web
    name: enterprise-rag-qdrant
    runtime: docker
    image: docker.io/qdrant/qdrant:v1.9.3
    region: oregon
    plan: starter
    envVars:
      - key: QDRANT__SERVICE__HTTP_PORT
        value: 6333
    disk:
      name: qdrant-storage
      mountPath: /qdrant/storage
      sizeGB: 10

  # ── Celery Worker ────────────────────────────────────────────
  - type: worker
    name: enterprise-rag-worker
    runtime: docker
    repo: https://github.com/harshchavan009/AI-Chatbot
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    startCommand: celery -A app.tasks.celery_app:celery_app worker --loglevel=info --concurrency=2
    region: oregon
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: enterprise-rag-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: enterprise-rag-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

# ── Managed Databases ─────────────────────────────────────────
databases:
  - name: enterprise-rag-db
    databaseName: enterprise_rag
    region: oregon
    plan: starter

  - name: enterprise-rag-redis
    type: redis
    region: oregon
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all
